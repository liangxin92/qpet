name: Bug report
description: Report a reproducible Qpet problem without personal or secret data
title: "[Bug] "
labels:
  - bug
body:
  - type: dropdown
    id: input_mode
    attributes:
      label: Input mode
      options:
        - Keywords
        - User-attached selfie
        - Authorized reference
        - Package validation
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Remove personal information, credentials, and unredacted photos.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Codex version and operating system
    validations:
      required: true

